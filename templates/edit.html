<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Note</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    font-family:'Poppins',sans-serif;
}

body{
    background:#eef2ff;
}

body.dark{
    background:#0f172a;
    color:white;
}

body.dark .note-card{
    background:#1e293b;
    color:white;
}

body.dark .navbar{
    background:#1e40af !important;
}
.edit-card{
    max-width:600px;
    margin:50px auto;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.heading{
    text-align:center;
    font-weight:700;
    color:#4338ca;
    margin-bottom:20px;
}

.btn-primary{
    background:#4338ca;
    border:none;
}

.btn-primary:hover{
    background:#3730a3;
}
    </style>

</head>


<body class="{% if request.session.theme == 'dark' %}dark{% endif %}">

<div class="container">

    <div class="edit-card">

        <div class="heading">
             Edit Note
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- TITLE -->
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title"
                       value="{{ note.title }}"
                       class="form-control">
            </div>

            <!-- SUBJECT -->
            <div class="mb-3">
                <label class="form-label">Subject</label>
                <input type="text" name="subject"
                       value="{{ note.subject }}"
                       class="form-control">
            </div>

            <!-- DESCRIPTION -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" rows="4"
                          class="form-control">{{ note.description }}</textarea>
            </div>

            <!-- PDF -->
            <div class="mb-3">
                <label class="form-label">Replace PDF (optional)</label>
                <input type="file" name="pdf" class="form-control">
            </div>

            {% if note.pdf %}
                <div class="mb-3">
                    <a href="{{ note.pdf.url }}" target="_blank" class="btn btn-outline-secondary btn-sm">
                        📄 View Current PDF
                    </a>
                </div>
            {% endif %}

            <!-- BUTTONS -->
            <div class="d-flex justify-content-between">

                <a href="/" class="btn btn-outline-secondary">
                    ← Back
                </a>

                <button type="submit" class="btn btn-primary">
                    Save Changes
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
