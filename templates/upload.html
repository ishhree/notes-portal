<!DOCTYPE html>
<html>
<head>
    <title>Upload Note</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="{% if request.session.theme == 'dark' %}dark{% endif %}">



<div class="container mt-5">

    <!-- 🔥 PASTE YOUR UPLOAD CODE HERE -->
    <div class="upload-box">

        <h3 class="text-center">  Upload Note</h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <input type="text" name="title" class="form-control mb-2" placeholder="Title">

            <input type="text" name="subject" class="form-control mb-2" placeholder="Subject">

            <textarea name="description" class="form-control mb-2" placeholder="Description"></textarea>

            <input type="file" name="pdf" class="form-control mb-3">

             <input type="file" name="image" class="form-control">
             
            <button class="btn btn-primary w-100">Upload</button>
        </form>

    </div>

</div>

</body>
</html>
