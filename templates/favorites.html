<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Favorites</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6fb;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:25px 0;
}

.title{
    font-size:22px;
    font-weight:700;
    color:#111827;
}

.subtitle{
    font-size:13px;
    color:#6b7280;
}

.note-card{
    border:none;
    border-radius:14px;
    background:#fff;
    box-shadow:0 6px 18px rgba(0,0,0,0.06);
    transition:.25s ease;
    overflow:hidden;
    height:100%;
}

.note-card:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 25px rgba(0,0,0,0.10);
}

.note-img{
    height:170px;
    width:100%;
    object-fit:cover;
}

.card-body{
    padding:14px;
}

.note-title{
    font-size:16px;
    font-weight:600;
    color:#111827;
    margin-bottom:4px;
}

.note-subject{
    font-size:13px;
    color:#6b7280;
}

.note-desc{
    font-size:13px;
    color:#4b5563;
    margin-top:8px;
}

.empty{
    text-align:center;
    padding:60px 20px;
    color:#6b7280;
}
</style>

</head>

<body class="{% if request.session.theme == 'dark' %}dark{% endif %}">
<div class="container">

    <div class="header">
        <div>
            <div class="title"> Favorites</div>
            <div class="subtitle">Your saved notes</div>
        </div>

        <a href="/" class="btn btn-primary">
            ← Back Home
        </a>
    </div>

    <div class="row">

        {% for note in notes %}

        <div class="col-md-4 mb-4">

            <div class="note-card">

                {% if note.image %}
                    <img src="{{ note.image.url }}" class="note-img">
                {% endif %}

                <div class="card-body">

                    <div class="note-title">
                        {{ note.title }}
                    </div>

                    <div class="note-subject">
                        {{ note.subject }}
                    </div>

                    <div class="note-desc">
                        {{ note.description|truncatechars:100 }}
                    </div>

                    <div class="d-flex gap-2 flex-wrap mt-3">

                        {% if note.pdf %}

                            <a href="/view-pdf/{{ note.id }}/"
                               target="_blank"
                               class="btn btn-sm btn-outline-secondary">
                                 View
                            </a>

                            <a href="{{ note.pdf.url }}"
                               download
                               class="btn btn-sm btn-primary">
                                 Download
                            </a>

                        {% endif %}

                        <a href="/fav/{{ note.id }}/"
                           class="btn btn-sm btn-warning">
                             Remove Favourite
                        </a>

                    </div>

                </div>

            </div>

        </div>

        {% empty %}

        <div class="empty">
            No favorite notes yet ⭐
        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
